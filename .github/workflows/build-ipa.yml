name: Build unsigned IPA

# Builds an UNSIGNED .ipa on every push to main, on version tags, and on
# manual dispatch. The artifact has no code signature, so install it with a
# re-signing sideload tool such as AltStore, Sideloadly, or TrollStore.
#
# To produce a *signed* IPA instead, add an Apple signing certificate +
# provisioning profile as repo secrets and switch the build/export steps to
# use them (see the README for notes).

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show build environment
        run: |
          xcodebuild -version
          xcodebuild -list -project ioshealth.xcodeproj

      - name: Build unsigned app
        run: |
          set -euo pipefail
          xcodebuild \
            -project ioshealth.xcodeproj \
            -scheme ioshealth \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO

      - name: Package into .ipa
        run: |
          set -euo pipefail
          APP_PATH="build/Build/Products/Release-iphoneos/ioshealth.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Built app not found at $APP_PATH"
            find build/Build/Products -maxdepth 2 -name '*.app' || true
            exit 1
          fi
          rm -rf Payload ioshealth.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr ioshealth.ipa Payload
          ls -lh ioshealth.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ioshealth-unsigned-ipa
          path: ioshealth.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Attach IPA to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ioshealth.ipa
